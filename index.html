<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NorthStarDevs - Elite ive Engineering</title>

  <!-- Google Fonts: Montserrat (Display), Poppins (Body), JetBrains Mono (Labels) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=JetBrains+Mono:wght@400;700&family=Montserrat:wght@800;900&family=Poppins:wght@400;500;600&display=swap"
    rel="stylesheet">

  <script>
    (function () {
      try {
        const theme = localStorage.getItem('theme');
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.setAttribute('data-theme', 'dark');
        } else {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      } catch (e) { }
    })();
  </script>
</head>

<body class="antialiased">
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
